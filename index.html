<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhishGuard — URL Threat Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --surface2: #111820;
    --border: #1e2d3d;
    --accent: #00f5c4;
    --accent2: #0af;
    --warn: #f5a623;
    --danger: #ff3b5c;
    --safe: #00f5c4;
    --text: #c9d4e0;
    --text-dim: #4a6278;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Radial glow */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(0,245,196,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 60px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeDown 0.7s ease both;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,245,196,0.07);
    border: 1px solid rgba(0,245,196,0.2);
    border-radius: 100px;
    padding: 6px 18px 6px 10px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }

  h1 {
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 16px;
  }

  h1 span {
    color: var(--accent);
    position: relative;
  }

  h1 span::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }

  .subtitle {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  /* Input section */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 32px;
    animation: fadeUp 0.7s 0.15s ease both;
    position: relative;
    overflow: hidden;
  }

  .input-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .input-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: block;
  }

  .input-row {
    display: flex;
    gap: 12px;
  }

  .url-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .url-input::placeholder { color: var(--text-dim); }

  .url-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,245,196,0.1);
  }

  .scan-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 14px 28px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    white-space: nowrap;
    position: relative;
    overflow: hidden;
  }

  .scan-btn:hover {
    background: #00ffd0;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,245,196,0.3);
  }

  .scan-btn:active { transform: translateY(0); }

  .scan-btn.loading {
    pointer-events: none;
    opacity: 0.8;
  }

  /* Example URLs */
  .examples {
    margin-top: 14px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .examples-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  .example-chip {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
    background: rgba(0,170,255,0.08);
    border: 1px solid rgba(0,170,255,0.2);
    border-radius: 6px;
    padding: 3px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .example-chip:hover {
    background: rgba(0,170,255,0.15);
    color: #fff;
  }

  /* Results */
  #results {
    animation: fadeUp 0.5s ease both;
  }

  /* Verdict card */
  .verdict-card {
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    border: 1px solid;
    position: relative;
    overflow: hidden;
  }

  .verdict-card.safe {
    background: rgba(0,245,196,0.05);
    border-color: rgba(0,245,196,0.3);
  }

  .verdict-card.suspicious {
    background: rgba(245,166,35,0.05);
    border-color: rgba(245,166,35,0.3);
  }

  .verdict-card.dangerous {
    background: rgba(255,59,92,0.05);
    border-color: rgba(255,59,92,0.3);
  }

  .verdict-icon {
    font-size: 48px;
    flex-shrink: 0;
    filter: drop-shadow(0 0 16px currentColor);
  }

  .verdict-card.safe .verdict-icon { color: var(--safe); }
  .verdict-card.suspicious .verdict-icon { color: var(--warn); }
  .verdict-card.dangerous .verdict-icon { color: var(--danger); }

  .verdict-text h2 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .verdict-card.safe .verdict-text h2 { color: var(--safe); }
  .verdict-card.suspicious .verdict-text h2 { color: var(--warn); }
  .verdict-card.dangerous .verdict-text h2 { color: var(--danger); }

  .verdict-url {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    word-break: break-all;
  }

  /* Score meter */
  .score-section {
    margin-left: auto;
    text-align: center;
    flex-shrink: 0;
  }

  .score-ring {
    position: relative;
    width: 90px;
    height: 90px;
  }

  .score-ring svg {
    transform: rotate(-90deg);
  }

  .score-ring-bg {
    fill: none;
    stroke: rgba(255,255,255,0.05);
    stroke-width: 6;
  }

  .score-ring-fill {
    fill: none;
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);
  }

  .score-number {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .score-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 3px;
    display: block;
  }

  /* Checks grid */
  .checks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .check-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeUp 0.4s ease both;
  }

  .check-item:hover {
    transform: translateY(-2px);
    border-color: rgba(255,255,255,0.1);
  }

  .check-item.flagged {
    border-color: rgba(255,59,92,0.3);
    background: rgba(255,59,92,0.04);
  }

  .check-item.warn-flagged {
    border-color: rgba(245,166,35,0.3);
    background: rgba(245,166,35,0.04);
  }

  .check-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .check-icon.pass { background: rgba(0,245,196,0.1); }
  .check-icon.fail { background: rgba(255,59,92,0.1); }
  .check-icon.warn { background: rgba(245,166,35,0.1); }

  .check-body { flex: 1; min-width: 0; }

  .check-name {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .check-detail {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .check-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 100px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .badge-pass { background: rgba(0,245,196,0.1); color: var(--safe); }
  .badge-fail { background: rgba(255,59,92,0.1); color: var(--danger); }
  .badge-warn { background: rgba(245,166,35,0.1); color: var(--warn); }

  /* Summary bar */
  .summary-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 22px;
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    font-family: var(--mono);
  }

  .summary-stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-value { font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }

  .stat-pass { color: var(--safe); }
  .stat-fail { color: var(--danger); }
  .stat-warn { color: var(--warn); }

  /* Section label */
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Scanning animation */
  .scanning-state {
    text-align: center;
    padding: 48px;
    font-family: var(--mono);
  }

  .scan-spinner {
    width: 48px;
    height: 48px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }

  .scan-text {
    font-size: 13px;
    color: var(--text-dim);
    animation: blink 1s step-end infinite;
  }

  /* Hidden */
  .hidden { display: none !important; }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes blink {
    50% { opacity: 0.3; }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .input-row { flex-direction: column; }
    .verdict-card { flex-direction: column; text-align: center; }
    .score-section { margin-left: 0; }
    .checks-grid { grid-template-columns: 1fr; }
    .summary-bar { gap: 20px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-badge">
      <div class="logo-dot"></div>
      Threat Intelligence Engine v2.0
    </div>
    <h1>Phish<span>Guard</span></h1>
    <p class="subtitle">// Real-time URL heuristic analysis — no API required</p>
  </header>

  <div class="input-card">
    <label class="input-label">Target URL</label>
    <div class="input-row">
      <input
        class="url-input"
        type="text"
        id="urlInput"
        placeholder="https://example.com/login"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="scan-btn" id="scanBtn" onclick="runScan()">⟶ Analyze</button>
    </div>
    <div class="examples">
      <span class="examples-label">Try:</span>
      <span class="example-chip" onclick="loadExample('http://192.168.1.1/secure-login/paypal/verify')">IP URL</span>
      <span class="example-chip" onclick="loadExample('https://secure.login.paypa1-verify.com/account/update')">Typosquat</span>
      <span class="example-chip" onclick="loadExample('https://www.google.com')">Legit URL</span>
      <span class="example-chip" onclick="loadExample('http://amaz0n-secure.tk/login?user=verify@account')">Phishing</span>
    </div>
  </div>

  <!-- Results area -->
  <div id="results" class="hidden"></div>

</div>

<script>
// ─── HEURISTIC ENGINE ────────────────────────────────────────────────────────

const SUSPICIOUS_KEYWORDS = [
  'login','verify','secure','update','account','banking','signin','password',
  'confirm','ebayisapi','webscr','support','validation','recover','billing',
  'alert','notification','service','suspended','limited','unlock'
];

const BRAND_TYPOSQUATS = {
  'paypal':  ['paypa1','paypai','paypa-l','pay-pal','paypall'],
  'google':  ['g00gle','googIe','go0gle','googie','goog1e'],
  'amazon':  ['amaz0n','amazoon','arnazon','amazon0'],
  'apple':   ['app1e','appl3','appie','aapple'],
  'microsoft':['microsof','micros0ft','mlcrosoft'],
  'facebook':['faceb00k','facebok','faceboook','facbook'],
  'netflix': ['netf1ix','nettflix','netlfix'],
  'instagram':['lnstagram','instagran','instagramm'],
  'twitter': ['twitterr','twiter','tw1tter'],
  'bank':    ['b4nk','ban-k','bankk'],
};

const SUSPICIOUS_TLDS = ['.tk','.ml','.ga','.cf','.gq','.xyz','.top','.click','.link','.work'];

const KNOWN_LEGIT_DOMAINS = [
  'google.com','youtube.com','facebook.com','wikipedia.org','amazon.com',
  'twitter.com','instagram.com','linkedin.com','github.com','microsoft.com',
  'apple.com','netflix.com','reddit.com','stackoverflow.com','cloudflare.com',
  'anthropic.com','openai.com'
];

function parseURL(raw) {
  raw = raw.trim();
  if (!raw.match(/^https?:\/\//i)) raw = 'http://' + raw;
  try {
    return new URL(raw);
  } catch(e) {
    return null;
  }
}

function getRootDomain(hostname) {
  const parts = hostname.replace(/^www\./, '').split('.');
  return parts.length >= 2 ? parts.slice(-2).join('.') : hostname;
}

function runChecks(raw) {
  const url = parseURL(raw);
  if (!url) return null;

  const hostname = url.hostname.toLowerCase();
  const fullUrl  = url.href.toLowerCase();
  const rootDomain = getRootDomain(hostname);
  const subdomains = hostname.split('.').slice(0, -2);
  const path = url.pathname + url.search;
  const tld = '.' + hostname.split('.').pop();

  const checks = [];

  // 1. HTTPS check
  const isHTTPS = url.protocol === 'https:';
  checks.push({
    id: 'https',
    name: 'HTTPS Protocol',
    weight: 20,
    passed: isHTTPS,
    severity: 'high',
    detail: isHTTPS ? 'Connection is encrypted via HTTPS' : 'No encryption — plain HTTP used',
  });

  // 2. IP address as host
  const isIP = /^(\d{1,3}\.){3}\d{1,3}$/.test(hostname);
  checks.push({
    id: 'ip',
    name: 'IP Address in URL',
    weight: 25,
    passed: !isIP,
    severity: 'high',
    detail: isIP ? `IP address ${hostname} used instead of domain` : 'Domain name used (not raw IP)',
  });

  // 3. URL length
  const urlLen = raw.length;
  const tooLong = urlLen > 75;
  checks.push({
    id: 'length',
    name: 'URL Length',
    weight: 10,
    passed: !tooLong,
    severity: 'medium',
    detail: `${urlLen} characters — ${tooLong ? 'exceeds safe threshold of 75' : 'within normal range'}`,
  });

  // 4. @ symbol
  const hasAt = fullUrl.includes('@');
  checks.push({
    id: 'atsign',
    name: '@ Symbol in URL',
    weight: 15,
    passed: !hasAt,
    severity: 'high',
    detail: hasAt ? '"@" found — browser ignores everything before it' : 'No @ symbol detected',
  });

  // 5. Excessive subdomains
  const subCount = subdomains.length;
  const tooManySubs = subCount > 2;
  checks.push({
    id: 'subdomains',
    name: 'Subdomain Depth',
    weight: 15,
    passed: !tooManySubs,
    severity: 'medium',
    detail: subCount > 0
      ? `${subCount} subdomain level(s): ${subdomains.join('.')}${tooManySubs ? ' — unusually deep' : ''}`
      : 'No excessive subdomains',
  });

  // 6. Suspicious keywords in URL
  const foundKw = SUSPICIOUS_KEYWORDS.filter(kw => fullUrl.includes(kw));
  const hasKw = foundKw.length >= 2;
  checks.push({
    id: 'keywords',
    name: 'Suspicious Keywords',
    weight: 15,
    passed: !hasKw,
    severity: 'medium',
    detail: foundKw.length > 0
      ? `Found: ${foundKw.slice(0,4).join(', ')}${foundKw.length > 4 ? '…' : ''}${hasKw ? ' — multiple triggers' : ' — low count'}`
      : 'No suspicious keywords detected',
  });

  // 7. Hyphen in domain
  const hyphenCount = (rootDomain.match(/-/g) || []).length;
  const tooManyHyphens = hyphenCount >= 2;
  checks.push({
    id: 'hyphen',
    name: 'Hyphens in Domain',
    weight: 10,
    passed: !tooManyHyphens,
    severity: 'low',
    detail: hyphenCount > 0
      ? `${hyphenCount} hyphen(s) in "${rootDomain}"${tooManyHyphens ? ' — common in phishing' : ''}`
      : 'No hyphens in domain name',
  });

  // 8. Suspicious TLD
  const badTLD = SUSPICIOUS_TLDS.includes(tld);
  checks.push({
    id: 'tld',
    name: 'TLD Reputation',
    weight: 15,
    passed: !badTLD,
    severity: 'medium',
    detail: badTLD
      ? `"${tld}" is a high-risk free TLD commonly abused in phishing`
      : `"${tld}" is a common legitimate TLD`,
  });

  // 9. Brand typosquat
  let typosquatMatch = null;
  for (const [brand, variants] of Object.entries(BRAND_TYPOSQUATS)) {
    for (const v of variants) {
      if (hostname.includes(v)) { typosquatMatch = { brand, variant: v }; break; }
    }
    if (typosquatMatch) break;
  }
  // Also check: known brand in subdomain but different root
  if (!typosquatMatch) {
    for (const brand of Object.keys(BRAND_TYPOSQUATS)) {
      if (subdomains.some(s => s.includes(brand)) && !rootDomain.includes(brand)) {
        typosquatMatch = { brand, variant: `"${brand}" in subdomain of unrelated domain` };
        break;
      }
    }
  }
  checks.push({
    id: 'typosquat',
    name: 'Brand Impersonation',
    weight: 25,
    passed: !typosquatMatch,
    severity: 'high',
    detail: typosquatMatch
      ? `Possible impersonation of "${typosquatMatch.brand}" via "${typosquatMatch.variant}"`
      : 'No known brand impersonation pattern detected',
  });

  // 10. Redirect indicators
  const redirectKw = ['redirect','redir','goto','url=','link=','out=','return='];
  const hasRedirect = redirectKw.some(kw => fullUrl.includes(kw));
  checks.push({
    id: 'redirect',
    name: 'Redirect Indicators',
    weight: 10,
    passed: !hasRedirect,
    severity: 'medium',
    detail: hasRedirect ? 'URL contains open redirect parameters' : 'No redirect chaining detected',
  });

  // 11. Known legit domain bonus
  const isKnownLegit = KNOWN_LEGIT_DOMAINS.includes(rootDomain);

  // ─── SCORE CALCULATION ────────────────────────────────────────────────────
  let riskScore = 0;
  for (const c of checks) {
    if (!c.passed) riskScore += c.weight;
  }

  // Clamp and apply legit bonus
  if (isKnownLegit && isHTTPS) riskScore = Math.max(0, riskScore - 30);
  riskScore = Math.min(100, riskScore);

  let verdict, verdictLabel;
  if (riskScore <= 25)      { verdict = 'safe';       verdictLabel = 'Likely Safe'; }
  else if (riskScore <= 55) { verdict = 'suspicious'; verdictLabel = 'Suspicious'; }
  else                      { verdict = 'dangerous';  verdictLabel = 'Phishing Risk'; }

  return { url, hostname, rootDomain, checks, riskScore, verdict, verdictLabel, isKnownLegit };
}

// ─── UI RENDERING ────────────────────────────────────────────────────────────

function loadExample(val) {
  document.getElementById('urlInput').value = val;
  runScan();
}

function runScan() {
  const raw = document.getElementById('urlInput').value.trim();
  if (!raw) return;

  const results = document.getElementById('results');
  const btn = document.getElementById('scanBtn');

  // Show scanning state
  btn.textContent = '⟳ Scanning…';
  btn.classList.add('loading');
  results.classList.remove('hidden');
  results.innerHTML = `
    <div class="scanning-state">
      <div class="scan-spinner"></div>
      <div class="scan-text">// Analyzing heuristic signatures…</div>
    </div>`;

  setTimeout(() => {
    const data = runChecks(raw);
    btn.textContent = '⟶ Analyze';
    btn.classList.remove('loading');

    if (!data) {
      results.innerHTML = `<div class="scanning-state"><div class="scan-text" style="color:#ff3b5c">// Invalid URL — please include a valid domain</div></div>`;
      return;
    }

    renderResults(data, results);
  }, 800);
}

function renderResults(data, container) {
  const { checks, riskScore, verdict, verdictLabel, url } = data;
  const icons = { safe: '🛡️', suspicious: '⚠️', dangerous: '🚨' };
  const circumference = 2 * Math.PI * 36; // r=36
  const offset = circumference - (riskScore / 100) * circumference;
  const ringColor = verdict === 'safe' ? '#00f5c4' : verdict === 'suspicious' ? '#f5a623' : '#ff3b5c';
  const scoreColor = ringColor;

  const passed  = checks.filter(c => c.passed).length;
  const failed  = checks.filter(c => !c.passed && c.severity === 'high').length;
  const warned  = checks.filter(c => !c.passed && c.severity !== 'high').length;

  let checksHTML = '';
  checks.forEach((c, i) => {
    const status = c.passed ? 'pass' : (c.severity === 'high' ? 'fail' : 'warn');
    const emoji  = c.passed ? '✓' : (c.severity === 'high' ? '✗' : '!');
    const badgeClass = `badge-${status}`;
    const cardClass  = c.passed ? '' : (c.severity === 'high' ? 'flagged' : 'warn-flagged');
    checksHTML += `
      <div class="check-item ${cardClass}" style="animation-delay:${i * 0.04}s">
        <div class="check-icon ${status}">${emoji}</div>
        <div class="check-body">
          <div class="check-name">${c.name}</div>
          <div class="check-detail">${c.detail}</div>
        </div>
        <span class="check-badge ${badgeClass}">${c.passed ? 'PASS' : (c.severity === 'high' ? 'HIGH' : 'MED')}</span>
      </div>`;
  });

  container.innerHTML = `
    <div class="verdict-card ${verdict}">
      <div class="verdict-icon">${icons[verdict]}</div>
      <div class="verdict-text">
        <h2>${verdictLabel}</h2>
        <div class="verdict-url">${url.href}</div>
      </div>
      <div class="score-section">
        <div class="score-ring">
          <svg width="90" height="90" viewBox="0 0 90 90">
            <circle class="score-ring-bg" cx="45" cy="45" r="36"/>
            <circle class="score-ring-fill" cx="45" cy="45" r="36"
              stroke="${ringColor}"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${circumference}"
              id="scoreRing"
              style="filter:drop-shadow(0 0 6px ${ringColor})"
            />
          </svg>
          <div class="score-number" style="color:${scoreColor}">
            ${riskScore}
            <span class="score-label">RISK</span>
          </div>
        </div>
      </div>
    </div>

    <div class="summary-bar" style="margin-bottom:24px">
      <div class="summary-stat">
        <span class="stat-value stat-pass">${passed}</span>
        <span class="stat-label">Checks Passed</span>
      </div>
      <div class="summary-stat">
        <span class="stat-value stat-fail">${failed}</span>
        <span class="stat-label">High Risk</span>
      </div>
      <div class="summary-stat">
        <span class="stat-value stat-warn">${warned}</span>
        <span class="stat-label">Medium Risk</span>
      </div>
      <div class="summary-stat">
        <span class="stat-value" style="color:var(--text)">${checks.length}</span>
        <span class="stat-label">Total Checks</span>
      </div>
    </div>

    <div class="section-label">Detailed Analysis</div>
    <div class="checks-grid">${checksHTML}</div>
  `;

  // Animate ring
  requestAnimationFrame(() => {
    setTimeout(() => {
      const ring = document.getElementById('scoreRing');
      if (ring) ring.style.strokeDashoffset = offset;
      ring.style.transition = 'stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1)';
    }, 80);
  });
}

// Enter key support
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') runScan();
  });
});
</script>
</body>
</html>
